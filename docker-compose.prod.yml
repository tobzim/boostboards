# Production compose — consumed by .github/workflows/deploy.yml on the
# private Hetzner server. Image is built in CI and pulled from GHCR.
#
# Bound to host port 8090 directly (no reverse-proxy, no domain). Reach
# the site via http://<SERVER_IP>:8090 once the port is open in the
# firewall. hub.cevere and atelierhubpim run untouched alongside.

services:

  web:
    image: ghcr.io/tobzim/boostboards:${IMAGE_TAG:-latest}
    container_name: boostboards-web
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - boostboards_media:/var/www/html/media
      - boostboards_accounts:/var/www/html/site/accounts
    environment:
      - APACHE_LOG_LEVEL=warn
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  boostboards_media:
  boostboards_accounts:
