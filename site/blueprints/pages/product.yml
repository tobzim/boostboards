title: Produkt

fields:
  badge:
    label: Badge
    type: text
  short:
    label: Kurzbeschreibung (Kachel)
    type: textarea
    size: small
  description:
    label: Volle Beschreibung
    type: textarea
    buttons:
      - headlines
      - bold
      - italic
      - link
      - ul
      - ol
  price:
    label: Preis
    type: text
    width: 1/3
  motor:
    label: Antrieb
    type: select
    width: 1/3
    options:
      paddle: Paddle
      electric: Electric
      fuel: Fuel
  power:
    label: Leistung
    type: text
    width: 1/3
  image:
    label: Produktbild
    type: files
    template: image
    max: 1
  gallery:
    label: Galerie
    type: files
    template: image
  specs:
    label: Technische Daten
    type: structure
    fields:
      label: { label: Bezeichnung, type: text }
      value: { label: Wert, type: text }

  shop_section:
    label: Shop & Stripe
    type: headline
  stripe_payment_link:
    label: Stripe Payment Link
    type: url
    help: >
      Leer lassen → CTA zeigt "Anfragen".
      Setze einen Stripe Payment Link (https://buy.stripe.com/...) → CTA wird "Jetzt kaufen" und das Board bekommt ein "Direkt kaufen"-Badge in der Übersicht.
  price_note:
    label: Preis-Hinweis (Pflicht bei direktem Verkauf)
    type: text
    default: "Inkl. 19 % MwSt., zzgl. Versand. Lieferzeit ca. 4–10 Wochen."
    width: 2/3
  shipping_eu:
    label: EU-Versand inklusive?
    type: toggle
    text:
      - "Nur DE"
      - "EU-weit"
    width: 1/3
