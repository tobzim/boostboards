title: BoostBoards

options:
  changeTitle: true

pages:
  type: pages
  layout: cards
  info: "{{ page.template.name }}"

fields:
  title:
    label: Site-Titel
    type: text
  tagline:
    label: Tagline
    type: text
  logo:
    label: Logo
    type: files
    template: image
    max: 1
  contact_address:
    label: Adresse
    type: textarea
    size: small
  contact_phone:
    label: Telefon
    type: text
  contact_mobile:
    label: Mobil / WhatsApp
    type: text
  contact_email:
    label: E-Mail
    type: email
  social_section:
    label: Social Media
    type: headline
  social_instagram:
    label: Instagram (Profil-URL)
    type: url
    width: 1/2
  social_whatsapp:
    label: WhatsApp (Nummer ohne + und Leerzeichen)
    type: text
    width: 1/2
  social_youtube:
    label: YouTube (Kanal-URL)
    type: url
    width: 1/2
  social_facebook:
    label: Facebook (Seiten-URL)
    type: url
    width: 1/2
  social_tiktok:
    label: TikTok (Profil-URL)
    type: url
    width: 1/2
  social_linkedin:
    label: LinkedIn (Seiten-URL)
    type: url
    width: 1/2
  contact_instagram:
    label: Instagram-Handle (Anzeige)
    type: text
